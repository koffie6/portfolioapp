# .github/workflows/test.yml
name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sanity-tests:
    name: Sanity Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run sanity tests with coverage
        run: npm run test:sanity -- --ci --coverage --json --outputFile=jest-results.json

      - name: Show Jest summary
        if: always()
        run: |
          echo "=== Jest Summary (Sanity, Node ${{ matrix.node }}) ==="
          npx jest --ci --reporters=summary || true

      - name: Upload Jest results, snapshots & coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-results-node-${{ matrix.node }}
          path: |
            jest-results.json
            __tests__/**/*.snap
            coverage/lcov.info
            coverage/coverage-summary.json

  stress-tests:
    name: Stress Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run stress tests with coverage
        run: npm run test:stress -- --ci --coverage --json --outputFile=jest-results.json

      - name: Show Jest summary
        if: always()
        run: |
          echo "=== Jest Summary (Stress, Node ${{ matrix.node }}) ==="
          npx jest --ci --reporters=summary || true

      - name: Upload Jest results, snapshots & coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results-node-${{ matrix.node }}
          path: |
            jest-results.json
            __tests__/**/*.snap
            coverage/lcov.info
            coverage/coverage-summary.json
