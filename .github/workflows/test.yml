name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]
        suite: [unit, stress, performance]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.suite }} tests
        run: |
          if [ "${{ matrix.suite }}" = "unit" ]; then
            npm run test:unit -- --config=jest.config.cjs
          elif [ "${{ matrix.suite }}" = "stress" ]; then
            npm run test:stress -- --config=jest.config.cjs --passWithNoTests
          elif [ "${{ matrix.suite }}" = "performance" ]; then
            npm run test:performance -- --config=jest.config.cjs --passWithNoTests
          fi
